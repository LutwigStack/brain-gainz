    <path d="M78 110h60M78 132h60M78 154h42" stroke="#5ee6b5" stroke-width="6" stroke-linecap="round"/>
    <rect x="326" y="88" width="92" height="76" rx="10" fill="#121b27" stroke="url(#table)" stroke-width="4"/>
    <path d="M342 110h60M342 132h48M342 154h60" stroke="#f6c445" stroke-width="6" stroke-linecap="round"/>
    <rect x="62" y="204" width="92" height="76" rx="10" fill="#121b27" stroke="#c084fc" stroke-width="4"/>
    <path d="M78 226h60M78 248h48M78 270h34" stroke="#c084fc" stroke-width="6" stroke-linecap="round"/>
    <rect x="326" y="204" width="92" height="76" rx="10" fill="#121b27" stroke="#fb7185" stroke-width="4"/>
    <path d="M342 226h60M342 248h36M342 270h56" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
